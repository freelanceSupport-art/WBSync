name: Bug report
description: WBSyncの不具合報告
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 何が起きたかを簡潔に書いてください。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: 不具合を再現する手順を書いてください。
      placeholder: |
        1. WBS Studioを開く
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期待した動作
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 環境
      placeholder: Windows 11 / WBSync.exe
