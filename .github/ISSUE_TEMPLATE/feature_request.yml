name: Feature request
description: WBSyncへの機能要望
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 解決したい課題
      description: どんな場面で困っているかを書いてください。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 提案する機能
      description: どんな機能があるとよいかを書いてください。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 代替案
      description: 他に考えた方法があれば書いてください。
